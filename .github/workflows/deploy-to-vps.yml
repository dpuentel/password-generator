name: Deploy to VPS

on:
  push:
    branches: ["main"]

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy using ssh
        id: deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            echo "🚀 Starting deployment..."

            echo "📦 Loading nvm..."
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 24

            echo "🔧 Node/pnpm versions:"
            node -v
            pnpm -v

            echo "📥 Pulling latest changes..."
            cd /opt/apps/password-generator
            git pull origin main
            git status

            echo "📦 Installing dependencies (IPv4 only, with retry)..."
            export NODE_OPTIONS="--dns-result-order=ipv4first"
            MAX_RETRIES=3
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if pnpm install --prod; then
                echo "✅ Dependencies installed successfully"
                break
              fi
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "⚠️ Install failed (attempt $RETRY_COUNT/$MAX_RETRIES). Retrying in 10s..."
                sleep 10
              fi
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "❌ Failed to install dependencies after $MAX_RETRIES attempts"
              echo "::error::Failed to install dependencies after $MAX_RETRIES attempts"
              exit 1
            fi

            echo "🏗️ Building application..."
            pnpm run build

            echo "✅ Deployment completed successfully 🎉"
          debug: true
