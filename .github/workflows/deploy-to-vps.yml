name: Deploy to VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    name: Deploy
    steps:
      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.PRIVATE_KEY }}
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -o StrictHostKeyChecking=no \
              -i /tmp/deploy_key \
              -p 22 \
              "$USERNAME@$HOST" << 'REMOTE_SCRIPT'
            set -e

            echo "🚀 Starting deployment..."

            echo "📦 Loading nvm..."
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 24

            echo "🔧 Node/pnpm versions:"
            node -v
            pnpm -v

            echo "📥 Pulling latest changes..."
            cd /opt/apps/password-generator
            git pull origin main
            git status

            echo "📦 Installing dependencies (IPv4 only, with retry)..."
            export NODE_OPTIONS="--dns-result-order=ipv4first"
            MAX_RETRIES=3
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if pnpm install --prod; then
                echo "✅ Dependencies installed successfully"
                break
              fi
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "⚠️ Install failed (attempt $RETRY_COUNT/$MAX_RETRIES). Retrying in 10s..."
                sleep 10
              fi
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "❌ Failed to install dependencies after $MAX_RETRIES attempts"
              exit 1
            fi

            echo "🏗️ Building application..."
            pnpm run build

            echo "✅ Deployment completed successfully 🎉"
          REMOTE_SCRIPT

          rm -f /tmp/deploy_key
